server {
    server_name relybit.co.jp www.relybit.co.jp;
    root /var/www/html;
    index index.html;

    location /rehap/lp/ {
        alias /var/www/rehap-lp/;
        index index.php;
        try_files $uri $uri/ @rehap_lp;
    }

    location @rehap_lp {
        rewrite /rehap/lp/(.*) /index.php?$args last;
    }

    location ~ ^/rehap/lp/(.+\.php)$ {
        alias /var/www/rehap-lp/;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/rehap-lp/$1;
    }

    location /store/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /auth/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/(admin|store-dashboard|store-login)\.html$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/relybit.co.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relybit.co.jp/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = relybit.co.jp) {
        return 301 https://$host$request_uri;
    }
    if ($host = www.relybit.co.jp) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name relybit.co.jp www.relybit.co.jp;
    return 404;
}

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REHAP 管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; }
    .header span { font-size: 12px; opacity: 0.6; background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; }

    .layout { display: flex; min-height: calc(100vh - 56px); }

    /* サイドバー */
    .sidebar { width: 220px; background: white; border-right: 1px solid #e0e0e0; padding: 16px 0; flex-shrink: 0; }
    .sidebar-section { padding: 8px 16px; font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
    .sidebar a { display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #555; text-decoration: none; font-size: 14px; cursor: pointer; }
    .sidebar a:hover, .sidebar a.active { background: #f0f4ff; color: #1a1a2e; font-weight: bold; }

    /* メイン */
    .main { flex: 1; padding: 24px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }

    h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }

    /* カード */
    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    /* テーブル */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-size: 12px; color: #888; border-bottom: 1px solid #eee; }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    /* ボタン */
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-danger { background: #ff4444; color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn + .btn { margin-left: 6px; }

    /* フォーム */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    textarea { height: 80px; resize: vertical; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 16px; margin-bottom: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

    /* バッジ */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .badge-blue { background: #e3f2fd; color: #1565c0; }

    /* トースト */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 200; }
    .toast.show { opacity: 1; }

    /* QRリンク */
    .qr-link { font-size: 12px; color: #888; font-family: monospace; background: #f5f5f5; padding: 4px 8px; border-radius: 4px; }

    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* ログインオーバーレイ */
    .login-overlay { display: none; position: fixed; inset: 0; background: #1a1a2e; z-index: 999; align-items: center; justify-content: center; }
    .login-overlay.open { display: flex; }
    .login-box { background: white; border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
    .login-box h2 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 12px; text-align: center; letter-spacing: 2px; }
    .login-box button { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .login-error { font-size: 13px; color: #e53935; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

<!-- ログインオーバーレイ -->
<div class="login-overlay open" id="login-overlay">
  <div class="login-box">
    <h2>REHAP</h2>
    <p>管理画面へのアクセスにはパスワードが必要です</p>
    <input type="password" id="login-password" placeholder="パスワード" onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-error" id="login-error">パスワードが正しくありません</div>
    <button onclick="doLogin()">ログイン</button>
  </div>
</div>

<div class="header">
  <h1>REHAP 管理画面</h1>
  <span>Prototype</span>
  <button onclick="doLogout()" style="margin-left:auto; padding:6px 14px; background:rgba(255,255,255,0.15); color:white; border:none; border-radius:6px; font-size:13px; cursor:pointer;">ログアウト</button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">メニュー</div>
    <a onclick="showPage('stores')" id="nav-stores" class="active">🏪 店舗管理</a>
    <a onclick="showPage('products')" id="nav-products">🛍️ 商品管理</a>
    <a onclick="showPage('coupons')" id="nav-coupons">🎟️ クーポン管理</a>
    <a onclick="showPage('visits')" id="nav-visits">📊 来店統計</a>
  </div>

  <div class="main">

    <!-- 店舗管理 -->
    <div class="page active" id="page-stores">
      <h2>店舗管理</h2>
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <span style="font-size:14px; color:#888;">登録店舗一覧</span>
          <button class="btn btn-primary" onclick="openModal('store')">＋ 店舗を追加</button>
        </div>
        <table>
          <thead><tr><th>店舗ID</th><th>店舗名</th><th>予約URL</th><th>QRリンク</th><th>QRコード</th><th>QR郵送</th><th>操作</th></tr></thead>
          <tbody id="stores-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 商品管理 -->
    <div class="page" id="page-products">
      <h2>商品管理</h2>
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:14px; color:#888;">絞り込み：</span>
            <select id="product-store-filter" onchange="loadProducts()" style="width:200px;">
              <option value="all">📋 全商品（全店舗）</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="openModal('product')">＋ 商品を追加</button>
        </div>
        <table>
          <thead><tr><th>画像</th><th>商品名</th><th>説明</th><th>掲載店舗</th><th>操作</th></tr></thead>
          <tbody id="products-table"></tbody>
        </table>
      </div>
    </div>

    <!-- クーポン管理 -->
    <div class="page" id="page-coupons">
      <h2>クーポン管理</h2>
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:14px; color:#888;">対象店舗：</span>
            <select id="coupon-store-filter" onchange="loadCoupons()" style="width:200px;">
              <option value="">店舗を選択</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="openModal('coupon')">＋ クーポンを追加</button>
        </div>
        <table>
          <thead><tr><th>タイトル</th><th>説明</th><th>解放条件</th><th>操作</th></tr></thead>
          <tbody id="coupons-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 来店統計 -->
    <div class="page" id="page-visits">
      <h2>来店統計</h2>
      <div style="display:flex; gap:16px; margin-bottom:16px;">
        <select id="visit-store-filter" onchange="loadVisits()" style="width:200px; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:14px;">
          <option value="">店舗を選択</option>
        </select>
      </div>
      <div id="visit-stats" style="display:flex; gap:16px; margin-bottom:16px;"></div>
      <div class="card">
        <table>
          <thead><tr><th>ユーザーID</th><th>来店回数</th><th>最終来店日</th></tr></thead>
          <tbody id="visits-table"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- 店舗モーダル -->
<div class="modal-overlay" id="modal-store">
  <div class="modal">
    <h3 id="modal-store-title">店舗を追加</h3>
    <input type="hidden" id="store-edit-id">
    <div class="form-group"><label>店舗ID（英数字）</label><input type="text" id="store-id" placeholder="例: store002"></div>
    <div class="form-group"><label>店舗名</label><input type="text" id="store-name" placeholder="例: リラックス整体院 渋谷店"></div>
    <div class="form-group"><label>説明</label><textarea id="store-desc" placeholder="店舗の説明文"></textarea></div>
    <div class="form-group"><label>予約URL</label><input type="text" id="store-booking" placeholder="https://..."></div>
    <div class="form-group">
      <label>QRコード画像</label>
      <div style="display:flex; align-items:center; gap:16px; margin-top:6px;">
        <div id="store-qr-preview-box" style="width:100px; height:100px; border:2px dashed #ccc; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fafafa; flex-shrink:0;">
          <span id="store-qr-placeholder" style="font-size:11px; color:#bbb; text-align:center; line-height:1.5;">未設定</span>
          <img id="store-qr-preview" style="display:none; width:100%; height:100%; object-fit:contain;">
        </div>
        <div>
          <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('store-qr-file').click()">画像を選択</button>
          <button type="button" class="btn btn-sm" id="store-qr-clear-btn" onclick="clearQrImage()" style="display:none; margin-left:6px; background:#f0f0f0; color:#666;">削除</button>
          <input type="file" id="store-qr-file" accept="image/*" style="display:none;" onchange="previewQrImage(this)">
          <input type="hidden" id="store-qr-data">
          <p style="font-size:11px; color:#999; margin-top:6px;">PNG / JPG 推奨</p>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('store')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveStore()">保存</button>
    </div>
  </div>
</div>

<!-- 商品モーダル -->
<div class="modal-overlay" id="modal-product">
  <div class="modal">
    <h3 id="modal-product-title">商品を追加</h3>
    <input type="hidden" id="product-edit-id">
    <div class="form-group" id="product-store-group">
      <label>対象店舗</label>
      <select id="product-store-id"></select>
    </div>
    <div class="form-group"><label>商品名</label><input type="text" id="product-name" placeholder="例: プロテインサプリ"></div>
    <div class="form-group"><label>説明</label><textarea id="product-desc" placeholder="商品の説明"></textarea></div>
    <div class="form-group"><label>アフィリエイトURL</label><input type="text" id="product-url" placeholder="https://..."></div>
    <div class="form-group"><label>商品画像URL</label><input type="text" id="product-image-url" placeholder="https://... (省略可)"></div>
    <div class="form-group"><label>表示順（空白でランダム）</label><input type="number" id="product-display-order" placeholder="例: 1（空白=ランダム）" min="1" style="width:200px;"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('product')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<!-- クーポンモーダル -->
<div class="modal-overlay" id="modal-coupon">
  <div class="modal">
    <h3 id="modal-coupon-title">クーポンを追加</h3>
    <input type="hidden" id="coupon-edit-id">
    <div class="form-group"><label>対象店舗</label>
      <select id="coupon-store-id"></select>
    </div>
    <div class="form-group"><label>タイトル</label><input type="text" id="coupon-title" placeholder="例: 5回来店クーポン"></div>
    <div class="form-group"><label>説明</label><textarea id="coupon-desc" placeholder="クーポンの内容"></textarea></div>
    <div class="form-group"><label>解放条件（来店回数）</label><input type="number" id="coupon-visits" value="5" min="1"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('coupon')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCoupon()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allStores = [];

// ページ切り替え
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'products') loadProducts();
  if (name === 'coupons') loadCoupons();
  if (name === 'visits') loadVisits();
}

// トースト通知
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// モーダル
function openModal(type, data = null) {
  if (type === 'store') {
    document.getElementById('modal-store-title').textContent = data ? '店舗を編集' : '店舗を追加';
    document.getElementById('store-edit-id').value = data?.id || '';
    document.getElementById('store-id').value = data?.id || '';
    document.getElementById('store-id').disabled = !!data;
    document.getElementById('store-name').value = data?.name || '';
    document.getElementById('store-desc').value = data?.description || '';
    document.getElementById('store-booking').value = data?.booking_url || '';
    document.getElementById('store-qr-data').value = data?.qr_image || '';
    document.getElementById('store-qr-file').value = '';
    if (data?.qr_image) {
      document.getElementById('store-qr-preview').src = data.qr_image;
      document.getElementById('store-qr-preview').style.display = 'block';
      document.getElementById('store-qr-placeholder').style.display = 'none';
      document.getElementById('store-qr-clear-btn').style.display = 'inline-block';
    } else {
      document.getElementById('store-qr-preview').style.display = 'none';
      document.getElementById('store-qr-placeholder').style.display = 'block';
      document.getElementById('store-qr-clear-btn').style.display = 'none';
    }
  }
  if (type === 'product') {
    document.getElementById('modal-product-title').textContent = data ? '商品を編集' : '商品を追加';
    document.getElementById('product-edit-id').value = data?.id || '';
    document.getElementById('product-name').value = data?.name || '';
    document.getElementById('product-desc').value = data?.description || '';
    document.getElementById('product-url').value = data?.affiliate_url || '';
    document.getElementById('product-image-url').value = data?.image_url || '';
    document.getElementById('product-display-order').value = data?.display_order ?? '';
    const sel = document.getElementById('product-store-id');
    sel.innerHTML = allStores.map(s => `<option value="${s.id}" ${data?.store_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
  }
  if (type === 'coupon') {
    document.getElementById('modal-coupon-title').textContent = data ? 'クーポンを編集' : 'クーポンを追加';
    document.getElementById('coupon-edit-id').value = data?.id || '';
    document.getElementById('coupon-title').value = data?.title || '';
    document.getElementById('coupon-desc').value = data?.description || '';
    document.getElementById('coupon-visits').value = data?.required_visits || 5;
    const sel = document.getElementById('coupon-store-id');
    sel.innerHTML = allStores.map(s => `<option value="${s.id}" ${data?.store_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
  }
  document.getElementById('modal-' + type).classList.add('open');
}
function closeModal(type) {
  document.getElementById('modal-' + type).classList.remove('open');
}

// ===== 店舗 =====
async function loadStores() {
  const res = await fetch('/api/admin/stores');
  allStores = await res.json();

  const tbody = document.getElementById('stores-table');
  if (!allStores.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">店舗がありません</td></tr>';
  } else {
    tbody.innerHTML = allStores.map(s => `
      <tr>
        <td><span class="badge badge-blue">${s.id}</span></td>
        <td>${s.name}</td>
        <td style="font-size:12px; color:#888;">${s.booking_url ? '設定済み' : '未設定'}</td>
        <td>
          <span class="qr-link">${location.origin}/store/${s.id}</span>
          <button class="btn btn-sm" style="margin-left:6px; background:#f0f0f0; color:#333;" onclick="copyStoreUrl('${s.id}')">コピー</button>
        </td>
        <td style="text-align:center;">
          ${s.qr_image
            ? `<img src="${s.qr_image}" style="width:48px; height:48px; object-fit:contain; border-radius:4px; border:1px solid #eee;" title="QRコード設定済み">`
            : `<span style="font-size:11px; color:#e53935; background:#ffeaea; padding:3px 8px; border-radius:4px; white-space:nowrap;">QRコード未発行</span>`}
        </td>
        <td style="text-align:center;">
          <label style="display:flex; align-items:center; justify-content:center; gap:4px; cursor:pointer; font-size:12px;">
            <input type="checkbox" ${s.qr_sent ? 'checked' : ''} onchange="toggleQrSent('${s.id}', this.checked)">
            郵送済み
          </label>
        </td>
        <td>
          <button class="btn btn-sm btn-primary" onclick='openModal("store", ${JSON.stringify(s)})'>編集</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStore('${s.id}')">削除</button>
        </td>
      </tr>
    `).join('');
  }

  // フィルター更新（商品は全店舗デフォルト）
  const productSel = document.getElementById('product-store-filter');
  const productCurrent = productSel.value || 'all';
  productSel.innerHTML = '<option value="all">📋 全商品（全店舗）</option>' + allStores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  productSel.value = productCurrent;

  ['coupon-store-filter', 'visit-store-filter'].forEach(id => {
    const sel = document.getElementById(id);
    const current = sel.value;
    sel.innerHTML = '<option value="">店舗を選択</option>' + allStores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    if (current) sel.value = current;
  });
}

function previewQrImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('store-qr-data').value = e.target.result;
    document.getElementById('store-qr-preview').src = e.target.result;
    document.getElementById('store-qr-preview').style.display = 'block';
    document.getElementById('store-qr-placeholder').style.display = 'none';
    document.getElementById('store-qr-clear-btn').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

function clearQrImage() {
  document.getElementById('store-qr-data').value = '';
  document.getElementById('store-qr-file').value = '';
  document.getElementById('store-qr-preview').style.display = 'none';
  document.getElementById('store-qr-placeholder').style.display = 'block';
  document.getElementById('store-qr-clear-btn').style.display = 'none';
}

async function saveStore() {
  const id = document.getElementById('store-edit-id').value || document.getElementById('store-id').value;
  const body = {
    id,
    name: document.getElementById('store-name').value,
    description: document.getElementById('store-desc').value,
    booking_url: document.getElementById('store-booking').value,
    qr_image: document.getElementById('store-qr-data').value || null,
  };
  const isEdit = !!document.getElementById('store-edit-id').value;
  await fetch(`/api/admin/stores${isEdit ? '/' + id : ''}`, {
    method: isEdit ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  closeModal('store');
  showToast(isEdit ? '店舗を更新しました' : '店舗を追加しました');
  loadStores();
}

async function toggleQrSent(id, sent) {
  await fetch(`/api/admin/stores/${id}/qr-sent`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ qr_sent: sent }),
  });
  showToast(sent ? 'QR郵送済みに設定しました' : '郵送済みを解除しました');
}

async function deleteStore(id) {
  if (!confirm(`店舗「${id}」を削除しますか？`)) return;
  await fetch('/api/admin/stores/' + id, { method: 'DELETE' });
  showToast('店舗を削除しました');
  loadStores();
}

// ===== 商品 =====
async function loadProducts() {
  const storeId = document.getElementById('product-store-filter').value || 'all';
  const res = await fetch('/api/admin/products/' + storeId);
  const products = await res.json();
  const tbody = document.getElementById('products-table');
  const isAll = storeId === 'all';
  if (!products.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">商品がありません</td></tr>`;
  } else if (isAll) {
    // 全店舗表示：商品名でグループ化
    const grouped = {};
    products.forEach(p => {
      if (!grouped[p.name]) grouped[p.name] = { info: p, stores: [] };
      grouped[p.name].stores.push(p.store_name);
    });
    tbody.innerHTML = Object.values(grouped).map(g => `
      <tr>
        <td style="width:60px;">
          ${g.info.image_url
            ? `<img src="${g.info.image_url}" style="width:48px; height:48px; border-radius:6px; object-fit:cover;">`
            : `<div style="width:48px; height:48px; border-radius:6px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; font-size:20px;">🛍️</div>`}
        </td>
        <td><strong>${g.info.name}</strong>${g.info.display_order != null ? `<br><span style="font-size:11px; color:#1a1a2e; background:#e8f0ff; padding:1px 6px; border-radius:4px;">表示順: ${g.info.display_order}</span>` : `<br><span style="font-size:11px; color:#aaa;">ランダム</span>`}</td>
        <td style="font-size:13px; color:#666;">${g.info.description || ''}</td>
        <td style="font-size:12px; color:#888;">${g.stores.join('、')}</td>
        <td>
          <button class="btn btn-sm btn-danger" onclick="deleteProductBulk('${g.info.name.replace(/'/g, "\\'")}')">全店舗から削除</button>
        </td>
      </tr>
    `).join('');
  } else {
    tbody.innerHTML = products.map(p => `
      <tr>
        <td style="width:60px;">
          ${p.image_url
            ? `<img src="${p.image_url}" style="width:48px; height:48px; border-radius:6px; object-fit:cover;">`
            : `<div style="width:48px; height:48px; border-radius:6px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; font-size:20px;">🛍️</div>`}
        </td>
        <td>${p.name}</td>
        <td style="font-size:13px; color:#666;">${p.description || ''}</td>
        <td style="font-size:12px; color:#888;">この店舗</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick='openModal("product", ${JSON.stringify(p)})'>編集</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">削除</button>
        </td>
      </tr>
    `).join('');
  }
}

async function saveProduct() {
  const id = document.getElementById('product-edit-id').value;
  const body = {
    store_id: document.getElementById('product-store-id').value,
    name: document.getElementById('product-name').value,
    description: document.getElementById('product-desc').value,
    affiliate_url: document.getElementById('product-url').value,
    image_url: document.getElementById('product-image-url').value,
    display_order: document.getElementById('product-display-order').value,
  };
  await fetch(`/api/admin/products${id ? '/' + id : ''}`, {
    method: id ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  closeModal('product');
  showToast(id ? '商品を更新しました' : '商品を追加しました');
  loadProducts();
}

async function deleteProduct(id) {
  if (!confirm('この商品を削除しますか？')) return;
  await fetch('/api/admin/products/' + id, { method: 'DELETE' });
  showToast('商品を削除しました');
  loadProducts();
}

async function deleteProductBulk(name) {
  if (!confirm(`「${name}」を全店舗から削除しますか？`)) return;
  await fetch('/api/admin/products-bulk/' + encodeURIComponent(name), { method: 'DELETE' });
  showToast(`「${name}」を全店舗から削除しました`);
  loadProducts();
}

// ===== クーポン =====
async function loadCoupons() {
  const storeId = document.getElementById('coupon-store-filter').value;
  if (!storeId) { document.getElementById('coupons-table').innerHTML = '<tr><td colspan="4" class="empty">店舗を選択してください</td></tr>'; return; }
  const res = await fetch('/api/admin/coupons/' + storeId);
  const coupons = await res.json();
  const tbody = document.getElementById('coupons-table');
  if (!coupons.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">クーポンがありません</td></tr>';
  } else {
    tbody.innerHTML = coupons.map(c => `
      <tr>
        <td>${c.title}</td>
        <td style="font-size:13px; color:#666;">${c.description || ''}</td>
        <td><span class="badge badge-blue">${c.required_visits}回来店</span></td>
        <td>
          <button class="btn btn-sm btn-primary" onclick='openModal("coupon", ${JSON.stringify(c)})'>編集</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCoupon(${c.id})">削除</button>
        </td>
      </tr>
    `).join('');
  }
}

async function saveCoupon() {
  const id = document.getElementById('coupon-edit-id').value;
  const body = {
    store_id: document.getElementById('coupon-store-id').value,
    title: document.getElementById('coupon-title').value,
    description: document.getElementById('coupon-desc').value,
    required_visits: parseInt(document.getElementById('coupon-visits').value),
  };
  await fetch(`/api/admin/coupons${id ? '/' + id : ''}`, {
    method: id ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  closeModal('coupon');
  showToast(id ? 'クーポンを更新しました' : 'クーポンを追加しました');
  loadCoupons();
}

async function deleteCoupon(id) {
  if (!confirm('このクーポンを削除しますか？')) return;
  await fetch('/api/admin/coupons/' + id, { method: 'DELETE' });
  showToast('クーポンを削除しました');
  loadCoupons();
}

// ===== 来店統計 =====
async function loadVisits() {
  const storeId = document.getElementById('visit-store-filter').value;
  if (!storeId) { document.getElementById('visits-table').innerHTML = '<tr><td colspan="3" class="empty">店舗を選択してください</td></tr>'; document.getElementById('visit-stats').innerHTML = ''; return; }
  const res = await fetch('/api/admin/visits/' + storeId);
  const data = await res.json();

  document.getElementById('visit-stats').innerHTML = `
    <div class="card" style="flex:1; text-align:center;">
      <div style="font-size:28px; font-weight:bold; color:#1a1a2e;">${data.totalVisits}</div>
      <div style="font-size:12px; color:#888; margin-top:4px;">累計来店数</div>
    </div>
    <div class="card" style="flex:1; text-align:center;">
      <div style="font-size:28px; font-weight:bold; color:#1a1a2e;">${data.uniqueUsers}</div>
      <div style="font-size:12px; color:#888; margin-top:4px;">ユニークユーザー数</div>
    </div>
    <div class="card" style="flex:1; text-align:center;">
      <div style="font-size:28px; font-weight:bold; color:#1a1a2e;">${data.todayVisits}</div>
      <div style="font-size:12px; color:#888; margin-top:4px;">本日の来店数</div>
    </div>
  `;

  const tbody = document.getElementById('visits-table');
  if (!data.users.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">来店データがありません</td></tr>';
  } else {
    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td style="font-family:monospace; font-size:12px; color:#888;">${u.user_id}</td>
        <td><strong>${u.visit_count}</strong> 回</td>
        <td>${u.last_visit}</td>
      </tr>
    `).join('');
  }
}

function copyStoreUrl(storeId) {
  navigator.clipboard.writeText(`${location.origin}/store/${storeId}`);
  showToast('URLをコピーしました');
}

// ===== 認証 =====
async function checkAuth() {
  const res = await fetch('/api/admin/me');
  const data = await res.json();
  if (data.isAdmin) {
    document.getElementById('login-overlay').classList.remove('open');
    loadStores();
  }
}

async function doLogin() {
  const password = document.getElementById('login-password').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('login-overlay').classList.remove('open');
    document.getElementById('login-error').style.display = 'none';
    loadStores();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
  }
}

async function doLogout() {
  await fetch('/api/admin/logout', { method: 'POST' });
  document.getElementById('login-password').value = '';
  document.getElementById('login-overlay').classList.add('open');
}

// 初期化
checkAuth();
</script>
</body>
